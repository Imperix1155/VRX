name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '23 4 * * 1' # weekly, Monday 04:23 UTC (off the hour to avoid contention)

# Default least-privilege; the analyze job elevates to write scan results.
permissions:
  contents: read

jobs:
  analyze:
    name: analyze (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload results to the Security → Code scanning tab
      actions: read # required for CodeQL on private repos; harmless when public
      packages: read # for private/internal CodeQL packs
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          languages: javascript-typescript

      # No build step: JS/TS is interpreted, so CodeQL analyzes the source directly.
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
