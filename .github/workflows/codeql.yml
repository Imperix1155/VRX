name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '23 4 * * 1' # weekly, Monday 04:23 UTC (off the hour to avoid contention)

# Default least-privilege; the analyze job elevates to write scan results.
permissions:
  contents: read

jobs:
  analyze:
    name: analyze (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload results to the Security → Code scanning tab
      actions: read # required for CodeQL on private repos; harmless when public
      packages: read # for private/internal CodeQL packs
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: javascript-typescript

      # No build step: JS/TS is interpreted, so CodeQL analyzes the source directly.
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
