name: Release

# Auto-publishes a GitHub Release with installers when a version tag is pushed.
#
# Process: bump package.json version -> commit -> tag `vX.Y.Z` to match, then
# push the tag. electron-builder derives artifact names and latest.yml from
# package.json, so the tag and package version MUST agree.
#
# Flow: create a DRAFT release with auto-generated notes -> each OS uploads its
# installers + electron-updater manifest into that draft -> flip it to published
# only if every build leg succeeded (a failed build leaves a private draft to
# inspect, delete, and retry).
on:
  push:
    tags: ['v*']

# One release run per tag; never cancel a publish already in flight.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Needed to create the release and upload assets via GITHUB_TOKEN.
permissions:
  contents: write

jobs:
  create-release:
    name: create draft release
    runs-on: ubuntu-latest
    steps:
      # Checks out the tagged commit (tag push), so the version read below is the
      # one this release will actually ship.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Fail fast if the tag and package.json disagree: electron-builder derives
      # artifact names and latest.yml from package.json, so a mismatch would
      # publish broken updater metadata. Equality (not a semver regex) so
      # prereleases like v0.1.0-beta.1 still pass.
      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION" >&2
            exit 1
          fi

      # Pull this version's section out of CHANGELOG.md for the release notes
      # (VRX-126). Falls back to GitHub's auto-generated notes if the section is
      # missing, so a release never ships with empty notes.
      - name: Build release notes from CHANGELOG
        run: |
          # `if node ...` keeps `set -e` from killing the step on an extractor
          # failure: any non-zero exit OR empty output takes the fallback branch,
          # so a release never fails (or ships truncated notes) over this.
          if node scripts/extract-changelog.mjs "${GITHUB_REF_NAME#v}" > /tmp/release-notes.md && [ -s /tmp/release-notes.md ]; then
            echo "HAVE_NOTES=1" >> "$GITHUB_ENV"
          else
            echo "No CHANGELOG section for ${GITHUB_REF_NAME#v} (or extractor failed) — using auto-generated notes." >&2
            : > /tmp/release-notes.md
            echo "HAVE_NOTES=0" >> "$GITHUB_ENV"
          fi

      - name: Create draft release
        run: |
          if [ "$HAVE_NOTES" = "1" ]; then
            gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --draft --prerelease --verify-tag --notes-file /tmp/release-notes.md
          else
            gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --draft --prerelease --verify-tag --generate-notes
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: build (${{ matrix.platform }})
    needs: create-release
    strategy:
      fail-fast: false
      # Serial: avoid two electron-builder publish runs mutating the same
      # release concurrently. Release builds are not latency-sensitive.
      max-parallel: 1
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}
    steps:
      # persist-credentials: false — npm ci runs third-party postinstall scripts
      # (electron-builder install-app-deps, better-sqlite3 native build) and no
      # later step needs git auth (electron-builder publishes via GH_TOKEN env).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      # `npm ci` runs the postinstall hook (electron-builder install-app-deps),
      # rebuilding better-sqlite3 against Electron's ABI on each OS.
      - name: Install dependencies
        run: npm ci

      # Compiles to out/, then packages installers (Linux: AppImage + deb;
      # Windows: nsis + portable) and uploads them plus the latest*.yml
      # electron-updater manifests into the draft release for this tag.
      - name: Build and publish ${{ matrix.platform }} installers
        run: |
          npm run build
          npx electron-builder --${{ matrix.platform }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Mark release as published
        run: gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
